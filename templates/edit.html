<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="/save" method="POST">
        <input type="text" name="artist" value="{{ song['Artist'] }}">
        <input type="text" name="title" value="{{ song['Title'] }}">
        <input type="text" name="album" value="{{ song['Album'] }}">
        <input type="text" name="track-number" value="{{ song['Track Number'] }}">
        <input type="number" name="date" value="{{ song['Date'] }}">
        <input type="hidden" name="path" value="{{ song['Path'] }}">
        <button type="submit">Save</button>

    </form>

</body>
</html>
